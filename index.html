<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Angel 🎉💖</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  h1 {
    position: relative;
    font-size: 5em;
    color: #fff;
    text-shadow: 0 0 20px rgba(255,255,255,0.6);
    z-index: 2;
    text-align: center;
  }

  .heart {
    position: absolute;
    width: 20px;
    height: 20px;
    background: red;
    transform: rotate(-45deg);
    animation: float 6s infinite ease-in-out;
    z-index: 1;
  }

  .heart::before,
  .heart::after {
    content: "";
    position: absolute;
    width: 20px;
    height: 20px;
    background: red;
    border-radius: 50%;
  }

  .heart::before { top: -10px; left: 0; }
  .heart::after { top: 0; left: 10px; }

  @keyframes float {
    0% { transform: translateY(0) rotate(-45deg); opacity:1; }
    50% { transform: translateY(-300px) rotate(-45deg); opacity:0.7; }
    100% { transform: translateY(-600px) rotate(-45deg); opacity:0; }
  }
</style>
</head>
<body>

<h1>Happy Birthday Angel</h1>

<script>
  const colors = ['#ff6b6b','#ff4757','#ff7f50','#ff1493','#ff69b4'];
  for(let i=0;i<50;i++){
    let heart = document.createElement('div');
    heart.classList.add('heart');
    heart.style.left = Math.random() * window.innerWidth + 'px';
    heart.style.animationDuration = (4 + Math.random() * 4) + 's';
    heart.style.width = heart.style.height = (10 + Math.random()*20) + 'px';
    heart.style.background = colors[Math.floor(Math.random()*colors.length)];
    document.body.appendChild(heart);
  }
</script>

<audio autoplay loop>
  <source src="kesariya_instrumental.mp3" type="audio/mpeg">
  Your browser does not support the audio element.
</audio>

</body>
</html>
